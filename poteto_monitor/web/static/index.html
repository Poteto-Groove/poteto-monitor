<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>poteto-monitor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🥔%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🥔</span>
      <div>
        <h1>poteto-monitor</h1>
        <p class="tagline">暗号資産 &amp; 為替 ライブモニター</p>
      </div>
    </div>
    <div class="status">
      <span id="conn-dot" class="dot" title="接続状態"></span>
      <span id="conn-text" class="muted">接続中…</span>
      <span class="sep">•</span>
      <span id="updated" class="muted">—</span>
      <button id="btn-refresh" class="btn ghost" title="今すぐ更新">↻ 更新</button>
      <button id="btn-settings" class="btn" title="設定">⚙ 設定</button>
    </div>
  </header>

  <main>
    <div id="banner" class="banner hidden"></div>
    <section id="cards" class="grid" aria-live="polite"></section>
    <p id="empty" class="empty hidden">監視対象がありません。「⚙ 設定」から追加してください。</p>
  </main>

  <!-- 設定ドロワー -->
  <div id="drawer" class="drawer hidden" role="dialog" aria-modal="true" aria-label="設定">
    <div class="drawer-panel">
      <div class="drawer-head">
        <h2>⚙ 設定</h2>
        <button id="btn-close" class="btn ghost">✕</button>
      </div>
      <div class="drawer-body">
        <div id="cfg-error" class="banner err hidden"></div>

        <fieldset>
          <legend>全体</legend>
          <div class="row">
            <label>基準通貨
              <input id="cfg-base" type="text" placeholder="usd" />
            </label>
            <label>既定アラート閾値 (%)
              <input id="cfg-threshold" type="number" step="0.1" min="0" />
            </label>
          </div>
          <div class="row">
            <label>更新間隔 (秒)
              <input id="cfg-poll" type="number" min="5" />
            </label>
            <label>定期レポート間隔 (秒, 0で無効)
              <input id="cfg-report" type="number" min="0" />
            </label>
          </div>
          <label>Discord Webhook URL
            <input id="cfg-webhook" type="password" placeholder="（設定済みの場合は空欄のまま）" autocomplete="off" />
          </label>
          <label>Web 認証トークン（任意）
            <input id="cfg-token" type="password" placeholder="（変更する場合のみ入力）" autocomplete="off" />
          </label>
        </fieldset>

        <fieldset>
          <legend>監視対象 <span class="muted" id="watch-count"></span></legend>
          <div id="watch-list" class="watch-list"></div>
          <div class="add-row">
            <button id="add-crypto" class="btn ghost">＋ 暗号資産</button>
            <button id="add-forex" class="btn ghost">＋ 為替</button>
          </div>
        </fieldset>
      </div>
      <div class="drawer-foot">
        <span id="save-status" class="muted"></span>
        <button id="btn-save" class="btn primary">保存して反映</button>
      </div>
    </div>
    <div class="drawer-scrim" data-close></div>
  </div>

  <!-- 監視行テンプレート -->
  <template id="tpl-crypto">
    <div class="watch-item" data-type="crypto">
      <span class="badge crypto">crypto</span>
      <input class="w-emoji" placeholder="🪙" maxlength="4" />
      <input class="w-id" placeholder="bitcoin (CoinGecko ID)" />
      <input class="w-label" placeholder="表示名" />
      <input class="w-vs" placeholder="usd,jpy" />
      <input class="w-threshold" type="number" step="0.1" placeholder="閾値%" />
      <button class="btn ghost w-del" title="削除">🗑</button>
    </div>
  </template>
  <template id="tpl-forex">
    <div class="watch-item" data-type="forex">
      <span class="badge forex">forex</span>
      <input class="w-emoji" placeholder="💱" maxlength="4" />
      <input class="w-base" placeholder="USD" />
      <input class="w-quote" placeholder="JPY" />
      <input class="w-label" placeholder="表示名" />
      <input class="w-threshold" type="number" step="0.1" placeholder="閾値%" />
      <button class="btn ghost w-del" title="削除">🗑</button>
    </div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
